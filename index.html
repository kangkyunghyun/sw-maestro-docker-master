<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SW Maestro Docker Demo</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .box {
            background: rgba(255, 255, 255, 0.15);
            padding: 40px 60px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        h1 { margin: 0 0 10px; font-size: 2.5em; }
        p { margin: 5px 0; opacity: 0.9; }
        code {
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🐳 Hello, Docker!</h1>
        <p>이 페이지는 <code>nginx</code> 컨테이너에서 서빙되고 있습니다.</p>
        <p>SW Maestro · Container 기초 실습</p>
    </div>
</body>
</html>
